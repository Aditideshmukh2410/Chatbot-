<style>
/* Global Styles */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body{
    height: 100vh;
    background: linear-gradient(135deg,#1a2a6c,#b21f1f,#fdbb2d);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 3D Glassmorphism Container */
.chatbot-container{
    width: 380px;   
    height: 600px;  
    background: rgba(255, 255, 255, 0.98);
    border-radius: 25px;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: pop 0.6s ease;
}

@keyframes pop{
    from{transform: scale(0.9); opacity:0;}
    to{transform: scale(1); opacity:1;}
}

/* Header with Mute Toggle */
.chatbot-header{
    background: linear-gradient(135deg,#0f3460,#162447);
    color: #fff;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    font-weight: 700;
}

#muteBtn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
    border-radius: 50%;
    transition: background 0.3s;
}

#muteBtn:hover {
    background: rgba(255, 255, 255, 0.1);
}

#muteBtn svg {
    width: 20px;
    height: 20px;
    fill: #ffffff;
}

/* ADDED: Quick Action Bar Style */
.action-bar {
    background: #f1f3f6;
    padding: 10px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    border-bottom: 1px solid #ddd;
    scrollbar-width: none; /* Firefox */
}
.action-bar::-webkit-scrollbar { display: none; } /* Chrome/Safari */

.action-chip {
    background: #fff;
    border: 1px solid #1a2a6c;
    color: #1a2a6c;
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}
.action-chip:hover { background: #1a2a6c; color: white; }

/* Language Selector */
.language-bar{
    background: #f9f9f9;
    padding: 8px;
    text-align: center;
    font-size: 14px;
    border-bottom: 1px solid #eee;
}

.language-bar select{
    padding: 4px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Chat Body */
.chatbot-body{
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #fdfcfb;
    display: flex;
    flex-direction: column;
}

/* 3D Message Wrapper */
.message-wrapper {
    display: flex;
    align-items: flex-end;
    margin-bottom: 15px;
}

.bot-wrapper { justify-content: flex-start; }
.user-wrapper { justify-content: flex-end; }

.avatar-3d {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    margin-right: 8px;
    background: #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border: 1px solid #ddd;
}

.message{
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
    animation: fade 0.3s ease;
    word-wrap: break-word;
}

.bot-gif {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 8px;
    display: block;
}

@keyframes fade{
    from{opacity:0; transform: translateY(5px);}
    to{opacity:1; transform: translateY(0);}
}

.user{
    background: linear-gradient(135deg,#0f3460,#162447);
    color: #fff;
    border-bottom-right-radius: 4px;
}

.bot{
    background: #ffffff;
    color: #333;
    border: 1px solid #ddd;
    border-bottom-left-radius: 4px;

/* 3D Robot Thinking Indicator */
.typing-indicator {
    display: none;
    align-items: center;
    margin: 10px 20px;
}

.floating-robot {
    width: 45px;
    height: 45px;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
    animation: float 2s infinite ease-in-out;
    margin-right: 12px;

@keyframes float {

#typing-text {

.chatbot-footer {

.mic-active svg {

.chatbot-footer button {

// --- 1. FUZZY MATCHING HELPERS ---
function getSimilarity(s1, s2) {
    let longer = s1.length < s2.length ? s2 : s1;
    let shorter = s1.length < s2.length ? s1 : s2;
    if (longer.length === 0) return 1.0;
    const editDistance = (a, b) => {
        const costs = [];
        for (let i = 0; i <= a.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= b.length; j++) {
                if (i === 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (a.charAt(i - 1) !== b.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[b.length] = lastValue;
        }
        return costs[b.length];
    };
    return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
}

function checkMatch(userInput, keywords) {
    const words = userInput.toLowerCase().split(/\s+/);
    return keywords.some(key => {
        if (userInput.toLowerCase().includes(key.toLowerCase())) return true;
        return words.some(word => getSimilarity(word, key.toLowerCase()) > 0.8);
    });
}

function toggleMute() {

function startVoiceRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Browser not supported.");
    const recognition = new SpeechRecognition();
    recognition.lang = langSelect.value === 'mr' ? 'mr-IN' : (langSelect.value === 'hi' ? 'hi-IN' : 'en-US');
    recognition.onstart = () => { micBtn.classList.add("mic-active"); input.placeholder = "Listening..."; };
    recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript;
        setTimeout(() => sendMessage(), 500);
    };
    recognition.onend = () => { micBtn.classList.remove("mic-active"); input.placeholder = "Ask anything..."; };
    recognition.start();
}

function loadVoices() {
    voices = window.speechSynthesis.getVoices();
    if (voices.length) {
        console.log("Voices loaded:", voices.map(v => v.name + " (" + v.lang + ")"));
    }
    else {
        window.speechSynthesis.addEventListener('voiceschanged', () => {
            voices = window.speechSynthesis.getVoices();
            console.log("Voices loaded on change:", voices.map(v => v.name + " (" + v.lang + ")"));
        });
    }
}

document.addEventListener("DOMContentLoaded", loadVoices);
function speakResponse(text, langCode) {
    if (isMuted) {
        typingIndicator.style.display = "none"; // hide if muted
        return;
    }

    window.speechSynthesis.cancel(); // stop any ongoing speech

    const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
    const langMap = { 'mr': 'mr-IN', 'hi': 'hi-IN', 'en': 'en-US' };
    const utterLang = langMap[langCode] || 'en-US';

    function actuallySpeak() {
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = utterLang;

        // Choose the best voice
        let selectedVoice = voices.find(v => v.lang === utterLang && v.name.includes('Google')) 
                         || voices.find(v => v.lang === utterLang)
                         || voices.find(v => v.lang.startsWith(langCode));
        if (selectedVoice) utterance.voice = selectedVoice;

        utterance.pitch = 1.1;
        utterance.rate = 1.0;

        // ✅ Hide typing indicator when speech ends
        utterance.onend = () => {
            typingIndicator.style.opacity = "0";
            setTimeout(() => typingIndicator.style.display = "none", 300); // smooth fade
            console.log("Speech finished");
        };

        window.speechSynthesis.speak(utterance);
    }

    if (voices.length > 0) {
        actuallySpeak();
    } else {
        window.speechSynthesis.addEventListener('voiceschanged', actuallySpeak, { once: true });
    }
}


async function sendMessage() {
